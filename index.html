<!--
  ─────────────────────────────────────────────────────────────────────────────
  PORTAL DE CONTENIDO — AUDIO (Latin Trading) · multi-marca
  Sitio estático. Sin base de datos, sin servidor. Las carpetas de Google Drive
  son la fuente de la verdad; este portal solo es un índice visual encima.

  ESTRUCTURA DE DATOS:  Marca -> Serie -> SKU   (ver folders.json)

  CÓMO USAR
  1. Edita  folders.json  -> marcas, series y URLs reales de Drive
     (reemplaza cada "https://drive.google.com/REEMPLAZA...").
  2. Sube  index.html + folders.json  juntos a Vercel o Netlify (plan gratis).
  3. Agregar una marca/serie/SKU = solo editar folders.json.

  LOGOS DE MARCA
  • Se incrustan en el mapa LOGOS (más abajo), no en folders.json, para que el
    JSON siga siendo liviano y fácil de editar a mano.
  • RCA ya viene incrustado. Para Hotline/Westinghouse pega su data URI en LOGOS
    cuando los tengas. Si una marca no tiene logo, se muestra su nombre en texto.
  • El logo oficial ya viene incrustado; no lo modifiques ni uses versiones por IA.
    Sobre fondo oscuro, agrega borde blanco de protección.

  TIPOGRAFÍAS: Montserrat / Inter / JetBrains Mono (sustitutos libres).
  Para producción web RCA, cambia a Proxima Nova.

  NOTA: si abres el archivo con file:// el navegador bloquea fetch() y se usan
  los datos de ejemplo incrustados (idénticos a folders.json). En https lee
  folders.json en vivo.
  ─────────────────────────────────────────────────────────────────────────────
-->

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#FAFAFA;
    --paper:#FFFFFF;
    --charcoal:#0A0A0A;
    --muted:#77787B;
    --muted-2:#9D9FA1;
    --line:#DCDDDE;

    --accent:#D70F29;        /* portal interactive red (B2B). The reserved logo red lives only inside the embedded PNG. */

    --mia-1:#E6007E; --mia-2:#7B2FF7; --mia-3:#00C2FF;
    --tok-bg:#0A0A0A; --tok-ink:#F1F1F2; --tok-mut:#9D9FA1;
    --tok-1:#19E3FF; --tok-2:#FF2CD1; --tok-3:#FFE14D;
    --ibz-1:#F2A900; --ibz-2:#FF5E5B;

    --display:'Montserrat', system-ui, -apple-system, sans-serif;
    --body:'Inter', system-ui, -apple-system, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

    --r:14px; --r-sm:10px;
    --gap:18px;
    --maxw:1180px;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream); color:var(--charcoal); font-family:var(--body);
       -webkit-font-smoothing:antialiased; line-height:1.45}
  a{color:inherit; text-decoration:none}

  /* header: identity + search + brand chips */
  .topbar{position:sticky; top:0; z-index:30; background:rgba(250,250,250,.9);
          backdrop-filter:saturate(140%) blur(10px); border-bottom:1px solid var(--line)}
  .topbar::after{content:""; display:block; height:2px; background:var(--accent)}
  .topbar__in{max-width:var(--maxw); margin:0 auto; padding:13px 22px;
              display:flex; align-items:center; gap:18px; flex-wrap:wrap}
  .brandmark{display:flex; align-items:center; gap:11px; min-width:0}
  .brandmark__glyph{width:34px; height:34px; flex:none; border-radius:8px; background:var(--charcoal);
                    display:grid; place-items:center}
  .brandmark__glyph svg{width:18px; height:18px; color:#fff}
  .brandmark__txt{display:flex; flex-direction:column; line-height:1.05; min-width:0}
  .brandmark__title{font-family:var(--display); font-weight:800; font-size:15px; letter-spacing:-.01em}
  .brandmark__sub{font-size:11px; color:var(--muted); font-weight:500}

  .search{margin-left:auto; position:relative; flex:1 1 240px; max-width:360px}
  .search__ico{position:absolute; left:12px; top:50%; transform:translateY(-50%);
               width:15px; height:15px; color:var(--muted-2); pointer-events:none}
  .search input{width:100%; font-family:var(--body); font-size:13.5px; color:var(--charcoal);
                padding:10px 12px 10px 34px; background:var(--paper);
                border:1px solid var(--line); border-radius:999px; outline:none;
                transition:border-color .15s, box-shadow .15s}
  .search input::placeholder{color:var(--muted-2)}
  .search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(215,15,41,.14)}

  .chips{max-width:var(--maxw); margin:0 auto; padding:0 22px 12px;
         display:flex; gap:8px; flex-wrap:wrap}
  .chip{font:600 12.5px/1 var(--body); padding:8px 14px; border-radius:999px;
        border:1px solid var(--line); background:var(--paper); color:var(--muted);
        cursor:pointer; transition:color .15s, border-color .15s, background .15s}
  .chip:hover{color:var(--charcoal); border-color:var(--muted-2)}
  .chip.is-on{background:var(--chip-accent,#0A0A0A); border-color:transparent; color:#fff}
  .chip:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* layout */
  main{max-width:var(--maxw); margin:0 auto; padding:26px 22px 72px}

  /* brand block (top level) */
  .brand{margin-top:56px; --brand-accent:#D70F29; animation:rise .5s both}
  .brand:first-of-type{margin-top:6px}
  .brand:nth-of-type(2){animation-delay:.06s}
  .brand:nth-of-type(3){animation-delay:.12s}
  @keyframes rise{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}

  .brand__bar{display:flex; align-items:center; gap:16px;
              padding-bottom:13px; border-bottom:2px solid var(--brand-accent)}
  .brand__logoimg{height:40px; width:auto; max-width:230px; display:block; object-fit:contain}
  .brand__word{font:800 25px/1 var(--display); letter-spacing:-.02em; color:var(--charcoal)}
  .brand__meta{margin-left:auto; font:600 11px/1 var(--mono); color:var(--muted);
               background:var(--paper); border:1px solid var(--line);
               padding:5px 10px; border-radius:999px; white-space:nowrap}
  .brand__empty{margin-top:18px; padding:40px 22px; text-align:center; color:var(--muted);
                border:1px dashed var(--line); border-radius:var(--r); background:var(--paper)}
  .brand__empty b{color:var(--charcoal); font-family:var(--display)}

  /* series block (second level) */
  .series{margin-top:28px}
  .series__head{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
                padding-bottom:11px; margin-bottom:16px; border-bottom:1px solid var(--line); position:relative}
  .series__name{font-family:var(--display); font-weight:700; font-size:18px; letter-spacing:-.01em}
  .series__tag{font-size:12.5px; color:var(--muted); font-weight:500}
  .series--miami .series__tag{letter-spacing:.14em; text-transform:uppercase; font-size:11px; font-weight:600}
  .series__count{margin-left:auto; font-family:var(--mono); font-size:11px; font-weight:600;
                 color:var(--muted); background:var(--paper); border:1px solid var(--line);
                 padding:3px 9px; border-radius:999px; white-space:nowrap}
  .series__head::after{content:""; position:absolute; left:0; bottom:-1px; height:2px; width:56px; border-radius:2px;
                       background:var(--brand-accent)}
  .series--miami .series__head::after{width:96px; background:linear-gradient(90deg,var(--mia-1),var(--mia-2),var(--mia-3))}
  .series--tokyo .series__head::after{width:96px; background:linear-gradient(90deg,var(--tok-1),var(--tok-2),var(--tok-3))}
  .series--ibiza .series__head::after{width:96px; background:linear-gradient(90deg,var(--ibz-1),var(--ibz-2))}

  .grid{display:grid; gap:var(--gap); grid-template-columns:repeat(auto-fill, minmax(208px,1fr))}

  /* sku tile (base) */
  .sku{position:relative; display:flex; flex-direction:column; min-height:148px;
       padding:16px 16px 14px; background:var(--paper); border:1px solid var(--line);
       border-radius:var(--r); overflow:hidden;
       transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease}
  .sku::before{content:""; position:absolute; inset:0 0 auto 0; height:4px; background:var(--brand-accent)}
  .sku__code{font-family:var(--display); font-weight:800; font-size:24px; letter-spacing:-.02em; margin-top:6px}
  .sku__specs{font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:7px}
  .sku__open{margin-top:auto; padding-top:14px; display:inline-flex; align-items:center; gap:6px;
             font-size:12.5px; font-weight:600; color:var(--muted); transition:color .16s, gap .16s}
  .sku__open svg{width:13px; height:13px}
  .sku:hover{transform:translateY(-4px); box-shadow:0 14px 28px -16px rgba(10,10,10,.28); border-color:transparent}
  .sku:hover .sku__open{gap:9px; color:var(--brand-accent)}
  .sku:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* RCA territory tile families */
  .series--miami .sku::before{background:linear-gradient(90deg,var(--mia-1),var(--mia-2),var(--mia-3))}
  .series--miami .sku:hover{box-shadow:0 14px 30px -14px rgba(123,47,247,.45)}
  .series--miami .sku:hover .sku__open{color:var(--mia-2)}

  .series--tokyo .sku{background:var(--tok-bg); border-color:#333F48; color:var(--tok-ink)}
  .series--tokyo .sku::before{background:linear-gradient(90deg,var(--tok-1),var(--tok-2),var(--tok-3))}
  .series--tokyo .sku__specs{color:var(--tok-mut)}
  .series--tokyo .sku__open{color:var(--tok-mut)}
  .series--tokyo .sku:hover{box-shadow:0 0 0 1px rgba(25,227,255,.35), 0 16px 36px -16px rgba(255,44,209,.6)}
  .series--tokyo .sku:hover .sku__open{color:var(--tok-1)}
  .series--tokyo .sku:focus-visible{outline-color:var(--tok-1)}

  .series--ibiza .sku::before{background:linear-gradient(90deg,var(--ibz-1),var(--ibz-2))}
  .series--ibiza .sku:hover{box-shadow:0 14px 30px -16px rgba(255,94,91,.5)}
  .series--ibiza .sku:hover .sku__open{color:var(--accent)}

  /* optional thumbnail variant */
  .sku--thumb{padding:0; min-height:172px; justify-content:flex-end}
  .sku--thumb .sku__media{position:absolute; inset:0; background-size:cover; background-position:center}
  .sku--thumb .sku__scrim{position:absolute; inset:0; background:linear-gradient(180deg,transparent 35%,rgba(0,0,0,.78))}
  .sku--thumb .sku__code,.sku--thumb .sku__specs,.sku--thumb .sku__open{position:relative; color:#fff; padding-left:16px; padding-right:16px}
  .sku--thumb .sku__open{padding-bottom:14px; color:rgba(255,255,255,.82)}

  .series__all{margin-top:14px; font-size:12px; font-weight:600; color:var(--brand-accent);
               display:inline-flex; align-items:center; gap:5px}
  .series__all svg{width:12px; height:12px}

  /* empty / footer */
  .empty{display:none; margin-top:30px; padding:46px 20px; text-align:center; color:var(--muted);
         border:1px dashed var(--line); border-radius:var(--r); background:var(--paper)}
  .empty strong{color:var(--charcoal); font-family:var(--display)}
  .foot{max-width:var(--maxw); margin:44px auto 0; padding:22px 22px 0; border-top:1px solid var(--line);
        color:var(--muted-2); font-size:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .foot b{color:var(--muted); font-weight:600}

  @media (max-width:540px){
    .brandmark__sub{display:none}
    .sku__code{font-size:21px}
    .brand__word{font-size:21px}
    main{padding:20px 16px 60px}
    .topbar__in{padding:12px 16px} .chips{padding:0 16px 12px}
  }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important} }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar__in">
    <a class="brandmark" href="#" aria-label="Inicio del portal">
      <span class="brandmark__glyph" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 12h2"/><path d="M8 7v10"/><path d="M12 4v16"/><path d="M16 8v8"/><path d="M20 11v2"/>

        <span class="brandmark__title">Portal de Contenido</span>

      </span>

    <div class="search" role="search">
      <svg class="search__ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>

</header>

<main id="app" aria-live="polite"></main>

<div class="empty" id="empty">

</div>

<footer class="foot">
  <span>Las carpetas en <b>Google Drive</b> son la fuente de la verdad.</span>
  <span>Edita <b>folders.json</b> para agregar marcas, series o SKUs.</span>
</footer>

  const all = ser.driveUrl
    ? `<a class="series__all" href="${esc(ser.driveUrl)}" target="_blank" rel="noopener" aria-label="Abrir carpeta completa de ${esc(ser.name)}">Carpeta de la serie ${EXT}</a>` : "";
  return `<section class="series series--${esc(ser.theme||'default')}" data-series="${esc((ser.name||'').toLowerCase())}">
      <div class="series__head">
        <h3 class="series__name">${esc(ser.name)}</h3>
        <span class="series__tag">${esc(ser.tagline||"")}</span>
        <span class="series__count">${count}</span>
      </div>
      <div class="grid">${ser.skus.map(skuTile).join("")}</div>
      ${all}
    </section>`;
}

function brandBar(b){
  const logo = LOGOS[b.id];
  const mark = logo
    ? `<img class="brand__logoimg" src="${logo}" alt="${esc(b.name)}">`
    : `<span class="brand__word">${esc(b.name)}</span>`;
  const live = (b.series||[]).filter(s=>s.skus&&s.skus.length);
  const nK = live.reduce((a,s)=>a+s.skus.length,0);
  const meta = nK ? `<span class="brand__meta">${live.length} ${live.length===1?"serie":"series"} · ${nK} SKUs</span>` : "";
  return `<div class="brand__bar">${mark}${meta}</div>`;
}

function brandSection(b){
  const live = (b.series||[]).filter(s=>s.skus&&s.skus.length);
  const inner = live.length
    ? live.map(seriesBlock).join("")
    : `<div class="brand__empty">Próximamente — agrega las series y SKUs de <b>${esc(b.name)}</b> en folders.json.</div>`;
  return `<section class="brand" data-brand="${esc(b.id)}" data-brandname="${esc(b.name.toLowerCase())}" data-empty="${live.length?0:1}" style="--brand-accent:${esc(b.accent||'#D70F29')}">
      ${brandBar(b)}
      ${inner}
    </section>`;
}

let DATA = FALLBACK_DATA;
let activeBrand = "all";
let term = "";

function renderChips(){
  const wrap = document.getElementById("chips");
  const all = `<button class="chip ${activeBrand==='all'?'is-on':''}" data-b="all" role="tab" aria-selected="${activeBrand==='all'}">Todas</button>`;
  const rest = DATA.brands.map(b=>
    `<button class="chip ${activeBrand===b.id?'is-on':''}" data-b="${esc(b.id)}" role="tab" aria-selected="${activeBrand===b.id}" style="--chip-accent:${esc(b.accent||'#0A0A0A')}">${esc(b.name)}</button>`
  ).join("");
  wrap.innerHTML = all + rest;
}

function render(){
  document.getElementById("app").innerHTML = DATA.brands.map(brandSection).join("");
  renderChips();
}

function apply(){
  const q = term.trim().toLowerCase();
  let visibleTiles = 0, visibleEmptyBrands = 0;

  document.querySelectorAll(".brand").forEach(bsec=>{
    const bid = bsec.dataset.brand, bname = bsec.dataset.brandname;
    const isEmpty = bsec.dataset.empty === "1";
    const brandMatch = (activeBrand==="all" || activeBrand===bid);

    if(isEmpty){
      const show = brandMatch && (!q || bname.includes(q));
      bsec.style.display = show ? "" : "none";
      if(show) visibleEmptyBrands++;
      return;
    }

    let shownInBrand = 0;
    bsec.querySelectorAll(".series").forEach(ssec=>{
      const sname = ssec.dataset.series || "";
      let shown = 0;
      ssec.querySelectorAll(".sku").forEach(t=>{
        const code = (t.querySelector(".sku__code")?.textContent || "").toLowerCase();
        const hit = !q || code.includes(q) || sname.includes(q) || bname.includes(q);
        const show = brandMatch && hit;
        t.style.display = show ? "" : "none";
        if(show) shown++;
      });
      ssec.style.display = shown ? "" : "none";
      shownInBrand += shown;
    });
    bsec.style.display = (brandMatch && shownInBrand) ? "" : "none";
    visibleTiles += shownInBrand;
  });

  const empty = document.getElementById("empty");
  const nothing = (visibleTiles + visibleEmptyBrands) === 0;
  document.getElementById("emptyq").textContent = `“${term}”`;
  empty.style.display = (q && nothing) ? "block" : "none";
}

function bind(){
  document.getElementById("q").addEventListener("input", e=>{ term = e.target.value; apply(); });
  document.getElementById("chips").addEventListener("click", e=>{
    const btn = e.target.closest(".chip"); if(!btn) return;
    activeBrand = btn.dataset.b; renderChips(); apply();
  });
}

async function init(){
  try{
    const res = await fetch("./folders.json", {cache:"no-store"});
    if(res.ok) DATA = await res.json();
  }catch(e){
    console.info("folders.json no disponible — usando datos de ejemplo incrustados.");
  }
  render(); bind(); apply();
}
init();
</script>
</body>
</html>
